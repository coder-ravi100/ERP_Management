{% extends 'hr_app/Dashboard.html' %}
{% load static %}
{% block meincontaint %}
<main class="app-main">
    <div class="container-fluid mt-4">
      <div class="app-content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-sm-6">
              <h3 class="mb-0">Setting</h3>
            </div>
            <div class="col-sm-6">
              <ol class="breadcrumb float-sm-end">
                <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
                <li class="breadcrumb-item active">HR Setting</li>
              </ol>
            </div>
          </div>
        </div>
      </div>  
      
        <!-- Leave Settings -->
        <div class="card mb-4">
          <div class="card-header text-white">
            Leave Settings
          </div>
          <div class="card-body">
            <div class="row g-3">
      
              <div class="col-md-4">
                <label class="form-label">Casual Leave Limit</label>
                <input type="number" class="form-control">
              </div>
      
              <div class="col-md-4">
                <label class="form-label">Sick Leave Limit</label>
                <input type="number" class="form-control">
              </div>
      
              <div class="col-md-4">
                <label class="form-label">Carry Forward Allowed</label>
                <select class="form-select">
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </div>
      
            </div>
          </div>
          <div class="card-footer text-end">
            <button class="btn btn-success">Save Changes</button>
          </div>
        </div>
      
        <!-- Attendance Settings -->
        <div class="card mb-4">
          <div class="card-header text-white">
            Attendance Settings
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Office Start Time</label>
                <input type="time" class="form-control">
              </div>
              <div class="col-md-4">
                <label class="form-label">Grace Time (Minutes)</label>
                <input type="number" class="form-control">
              </div>
            </div>
          </div>
          <div class="card-footer text-end">
            <button class="btn btn-success">Save Changes</button>
          </div>
        </div>
      
      </div>
</main>
{% endblock %}
